        - generic [ref=e474]: 5. PDF / Email
    - paragraph [ref=e475]:
      - text: En la tabla de Recibos, cada fila tiene un botón
      - strong [ref=e476]: FAC
      - text: (morado). Si el recibo aún no tiene factura, el botón genera una nueva. Si ya la tiene, abre directamente el diálogo de impresión de esa factura.
    - generic [ref=e477]:
      - generic [ref=e478]: ⚠️
      - generic [ref=e479]:
        - strong [ref=e480]: Requisitos previos
        - paragraph [ref=e481]:
          - strong [ref=e482]: Mi Empresa
          - text: "debe tener rellenos: Nombre y NIF/CIF. El"
          - strong [ref=e483]: inquilino
          - text: "debe tener: Nombre y NIF/NIE/CIF. Si falta algún dato, el programa indica exactamente qué completar."
    - heading "Numeración de facturas" [level=3] [ref=e484]
    - paragraph [ref=e485]:
      - text: Las facturas tienen su propio contador independiente del número de recibo. El formato es
      - code [ref=e486]: FAC-AAAAMM-NNNNN
      - text: con secuencial autónomo por mes. La primera factura del mes siempre es
      - code [ref=e487]: FAC-AAAAMM-00001
      - text: aunque el recibo origen sea el número 58. Los números de factura no se derivan de los recibos.
    - list [ref=e488]:
      - listitem [ref=e489]:
        - text: La numeración es
        - strong [ref=e490]: correlativa, única e inmutable
        - text: por serie y mes.
      - listitem [ref=e491]: No se puede editar el número de factura desde la interfaz.
      - listitem [ref=e492]: No se puede generar dos facturas del mismo recibo (bloqueado en base de datos).
    - heading "Inmutabilidad de las facturas" [level=3] [ref=e493]
    - paragraph [ref=e494]:
      - text: Una factura emitida
      - strong [ref=e495]: no se puede editar
      - text: . Los datos del emisor y del cliente se copian en el momento de emisión y quedan congelados históricamente.
