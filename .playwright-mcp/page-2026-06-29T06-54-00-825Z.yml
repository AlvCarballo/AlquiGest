    - paragraph [ref=e955]: Si has modificado un formulario en un modal y pulsas Escape o el botón de cerrar sin guardar, el programa te preguntará si deseas descartar los cambios. Así se evitan pérdidas accidentales de datos.
    - heading "Filtros avanzados en Recibos" [level=3] [ref=e956]
    - paragraph [ref=e957]: "La sección Recibos incluye una barra de filtros que permite combinar: estado del recibo, inquilino, y fechas desde/hasta. Los resultados se paginan de 30 en 30. El botón de paginación aparece en la parte inferior de la tabla."
    - heading "Historial del inquilino" [level=3] [ref=e958]
    - paragraph [ref=e959]:
      - text: Desde la lista de Inquilinos, el botón
      - strong [ref=e960]: Historial
      - text: "abre un panel con tres pestañas: todos los contratos que ha tenido, todos sus recibos y todas sus facturas. Incluye un resumen con el total facturado, cobrado y pendiente."
    - heading "Calendario de Cobros" [level=2] [ref=e961]
    - paragraph [ref=e962]: Accesible desde el menú lateral. Muestra un calendario mensual con todos los recibos vencidos en ese mes, agrupados por día. Los recibos pendientes aparecen en rojo, los cobrados en verde y los parciales en naranja. Los botones anterior/siguiente permiten navegar entre meses.
    - heading "Informe de Morosidad" [level=2] [ref=e963]
    - paragraph [ref=e964]:
      - text: Accesible desde el menú lateral. Lista todos los recibos en estado
      - emphasis [ref=e965]: Pendiente
      - text: o
      - emphasis [ref=e966]: Parcial
      - text: con más de 30 días de antigüedad desde su fecha límite, ordenados por importe pendiente.
    - paragraph [ref=e967]:
      - text: El botón
      - strong [ref=e968]: Exportar PDF
      - text: genera un informe formal de morosidad en formato A4 con los datos de la empresa, fecha de emisión y listado detallado por inquilino con importes acumulados.
    - paragraph [ref=e969]:
      - text: El filtro
      - strong [ref=e970]: Incluir recibos con menos de 30 días
      - text: amplía el listado para mostrar también los recibos recientes pendientes, útil para anticipar situaciones de morosidad.
    - heading "Generar Recibos en Lote" [level=2] [ref=e971]
