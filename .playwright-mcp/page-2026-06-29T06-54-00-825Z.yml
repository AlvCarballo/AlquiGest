    - heading "Generación de PDFs" [level=2] [ref=e843]
    - paragraph [ref=e844]: AlquiGest puede guardar recibos y facturas como PDF directamente desde el navegador, sin software adicional.
    - heading "Dos formas de generar PDF" [level=3] [ref=e845]
    - list [ref=e846]:
      - listitem [ref=e847]:
        - strong [ref=e848]: Botón "Imprimir / PDF"
        - text: ": abre el diálogo de impresión del navegador. Selecciona \"Guardar como PDF\" como destino."
      - listitem [ref=e849]:
        - strong [ref=e850]: Botón "Guardar PDF"
        - text: ": genera el archivo directamente usando html2canvas + jsPDF, sin pasar por el diálogo de impresión. El archivo se descarga automáticamente."
    - generic [ref=e851]:
      - generic [ref=e852]: 💡
      - generic [ref=e853]:
        - strong [ref=e854]: Formatos A4 y A5
        - paragraph [ref=e855]: Puedes elegir entre formato A4 (estándar) o A5 (más compacto, ideal para imprimir dos por hoja) al imprimir tanto recibos como facturas.
    - heading "VERI*FACTU — Configuración" [level=2] [ref=e856]
    - paragraph [ref=e857]:
      - text: AlquiGest incluye integración completa con
      - strong [ref=e858]: VERI*FACTU
      - text: (Sistema de Información de Facturación de la AEAT, regulado por el RD 1007/2023). La integración está
      - strong [ref=e859]: desactivada por defecto
      - text: y solo funciona si la activas explícitamente.
    - generic [ref=e860]:
