    - heading "Importación masiva desde CSV" [level=2] [ref=e1423]
    - paragraph [ref=e1424]:
      - text: Accesible desde el menú lateral →
      - strong [ref=e1425]: Importar datos
      - text: . Permite añadir registros en bloque desde un archivo CSV (exportado de Excel u otro programa).
    - heading "Formato del CSV" [level=3] [ref=e1426]
    - paragraph [ref=e1427]: La primera fila debe ser la cabecera con los nombres de los campos. El separador puede ser coma o punto y coma. El sistema detecta automáticamente cuál usar.
    - heading "Tipos de datos importables" [level=3] [ref=e1428]
    - list [ref=e1429]:
      - listitem [ref=e1430]: Propietarios
      - listitem [ref=e1431]: Inquilinos
      - listitem [ref=e1432]: Fincas
      - listitem [ref=e1433]: Inmuebles
    - heading "Proceso de importación" [level=3] [ref=e1434]
    - list [ref=e1435]:
      - listitem [ref=e1436]: Selecciona o arrastra el archivo CSV sobre la zona de importación.
      - listitem [ref=e1437]: El programa muestra una previsualización de los primeros registros y el número total.
      - listitem [ref=e1438]: Elige el tipo de datos a importar (propietarios, inquilinos…).
      - listitem [ref=e1439]:
        - text: Pulsa
        - strong [ref=e1440]: Importar
        - text: . El programa añade los registros uno a uno y muestra el progreso.
    - generic [ref=e1441]:
      - generic [ref=e1442]: ⚠️
      - generic [ref=e1443]:
        - strong [ref=e1444]: La importación no sobrescribe registros existentes
        - paragraph [ref=e1445]: Todos los registros del CSV se añaden como nuevos. Si ya existe un registro con el mismo nombre, se creará un duplicado. Revisa la previsualización antes de confirmar.
    - heading "Copia de seguridad" [level=2] [ref=e1446]
    - paragraph [ref=e1447]: "AlquiGest ofrece dos formas de hacer copia de seguridad:"
    - heading "1. Backup JSON desde Mi Empresa (recomendado)" [level=3] [ref=e1448]
    - paragraph [ref=e1449]:
      - text: Desde
      - strong [ref=e1450]: Mi Empresa
      - text: ", pulsa el botón"
      - strong [ref=e1451]: Descargar backup JSON
      - text: . Se descarga un fichero
      - code [ref=e1452]: alquigest_backup_AAAA-MM-DD.json
      - text: con todos los datos de la base de datos. Para restaurar los datos en otra instalación, ve a
      - code [ref=e1453]: install.php
      - text: →
      - emphasis [ref=e1454]: Restaurar desde JSON
      - text: .
    - heading "2. Backup SQL desde install.php" [level=3] [ref=e1455]
    - paragraph [ref=e1456]:
      - text: Desde
      - code [ref=e1457]: http://localhost/AlquiGest_v2/install.php
      - text: puedes descargar un volcado SQL completo de la base de datos o restaurar desde un backup anterior.
    - generic [ref=e1458]:
      - generic [ref=e1459]: 💡
      - generic [ref=e1460]:
        - strong [ref=e1461]: Periodicidad recomendada
        - paragraph [ref=e1462]: Haz una copia de seguridad al menos una vez a la semana y guárdala en una ubicación diferente al servidor (USB, nube, etc.). Los datos de la base de datos local no se sincronizan con ningún servidor externo.
    - heading "Certificado de retenciones IRPF" [level=2] [ref=e1463]
    - paragraph [ref=e1464]:
      - text: Desde la lista de
      - strong [ref=e1465]: Propietarios
      - text: ", los propietarios con IRPF marcado como \"S\" muestran un botón"
      - strong [ref=e1466]: Cert. IRPF
      - text: . Este botón genera un PDF con el certificado de retenciones del año, que acredita las cantidades retenidas e ingresadas a cuenta del IRPF del arrendador.
    - paragraph [ref=e1467]: "El certificado incluye: datos del retenedor (empresa), datos del perceptor (propietario), año fiscal, relación de inmuebles con rentas y retenciones, y total anual. Es apto para que el propietario lo adjunte a su declaración de la renta."
    - heading "Preguntas frecuentes" [level=2] [ref=e1468]
    - heading "¿Puedo instalar AlquiGest en un servidor real (no localhost)?" [level=3] [ref=e1469]
    - paragraph [ref=e1470]:
      - text: Sí, pero el programa está configurado por defecto para funcionar solo en
      - code [ref=e1471]: localhost
      - text: . Para uso en servidor real necesitarás editar
      - code [ref=e1472]: assets/php/api.php
      - text: "y"
      - code [ref=e1473]: assets/php/plantillas.php
      - text: eliminando la restricción
      - code [ref=e1474]: requireLocalhost()
      - text: . No se recomienda exponer la aplicación a internet sin añadir autenticación.
    - heading "¿Puedo tener varios contratos activos para el mismo inquilino?" [level=3] [ref=e1475]
    - paragraph [ref=e1476]:
      - text: Sí. Un inquilino puede alquilar varios inmuebles distintos al mismo tiempo. Lo que no puede haber es dos contratos activos para el
      - emphasis [ref=e1477]: mismo
      - text: inmueble.
    - heading "¿Qué pasa si un contrato está activo pero la fecha de fin ya ha pasado?" [level=3] [ref=e1478]
    - paragraph [ref=e1479]: AlquiGest no finaliza los contratos automáticamente. Debes marcarlo manualmente como "Finalizado" cuando el inquilino abandone el inmueble.
    - heading "¿Cómo cambio la numeración de los recibos?" [level=3] [ref=e1480]
    - paragraph [ref=e1481]:
      - text: El prefijo se configura en
      - strong [ref=e1482]: Mi Empresa → Prefijo de recibos
      - text: . El número secuencial es automático y no puede modificarse para garantizar la trazabilidad contable.
    - heading "¿Puedo eliminar un recibo que generé por error?" [level=3] [ref=e1483]
    - paragraph [ref=e1484]:
      - text: Sí. Desde el detalle del recibo puedes marcarlo como
      - strong [ref=e1485]: Anulado
      - text: . Los recibos anulados no aparecen en los informes pero se conservan en la base de datos por auditoría.
    - heading "¿Cómo funciona la revisión IPC?" [level=3] [ref=e1486]
    - paragraph [ref=e1487]: Cuando generas el recibo de un contrato con revisión de renta activa, AlquiGest detecta si ha pasado un año desde la última actualización y muestra el asistente IPC/IRAV. El asistente consulta el índice publicado por el INE y calcula la nueva renta sugerida. Puedes aceptarla, modificarla o rechazarla.
    - heading "¿Por qué mis plantillas Word pierden el formato tras generar el DOCX?" [level=3] [ref=e1488]
    - paragraph [ref=e1489]: Al sustituir variables, AlquiGest reconstruye el contenido de cada párrafo en un único bloque de texto. Esto puede eliminar formatos aplicados solo a una parte de la palabra que contiene la variable (negrita parcial, color de letra, etc.). Para evitarlo, aplica el formato a todo el párrafo, no solo a la variable.
    - heading "¿Puedo generar facturas sin IVA?" [level=3] [ref=e1490]
    - paragraph [ref=e1491]: Sí. Si el contrato tiene IVA = 0%, la factura se genera con base imponible y total iguales, sin desglose de IVA. Esto es lo habitual para arrendamientos de vivienda habitual.
    - heading "¿Qué pasa si el inquilino no tiene email?" [level=3] [ref=e1492]
    - paragraph [ref=e1493]: El botón de envío por email aparece en gris y no puede pulsarse. Para enviarlo, añade el email del inquilino en su ficha.
    - heading "¿Cómo convierto una plantilla DOCX a PDF?" [level=3] [ref=e1494]
    - paragraph [ref=e1495]: AlquiGest no incluye conversión DOCX → PDF porque requiere LibreOffice instalado en el servidor, que no está disponible en MAMP/Windows. Abre el DOCX descargado con Word o LibreOffice y exporta a PDF desde ahí.
    - heading "¿Los datos se sincronizan con algún servidor externo?" [level=3] [ref=e1496]
    - paragraph [ref=e1497]:
      - text: No. AlquiGest es
      - strong [ref=e1498]: 100% local
      - text: . Todos los datos se guardan en la base de datos MySQL de tu servidor local. No se envía ninguna información a internet, salvo los correos que envíes y, si lo activas, los registros VERI*FACTU a la AEAT.
    - heading "¿Cómo actualizo el programa a una versión nueva?" [level=3] [ref=e1499]
    - paragraph [ref=e1500]:
      - text: Copia los archivos nuevos en la carpeta del proyecto sobreescribiendo los existentes.
      - strong [ref=e1501]: No ejecutes install.php
      - text: porque borraría todos tus datos. Si hay cambios en la base de datos, encontrarás un archivo
      - code [ref=e1502]: migration_*.sql
      - text: con las instrucciones de actualización.
    - heading "¿Necesito activar VERI*FACTU?" [level=3] [ref=e1503]
    - paragraph [ref=e1504]: Depende de tu situación fiscal. Para arrendadores de vivienda habitual sin IVA y sin actividad empresarial, probablemente no. Para locales comerciales con IVA o si llevas la gestión como actividad económica, consulta con tu asesor fiscal. AlquiGest está listo para activarlo cuando lo necesites.
