    - paragraph [ref=e541]:
      - text: La sección
      - strong [ref=e542]: Facturas
      - text: del menú lateral muestra todas las facturas emitidas con filtros por año, mes, inquilino y estado. Si VERI*FACTU está activo, también muestra el estado de envío a la AEAT y un botón para enviar o reintentar.
