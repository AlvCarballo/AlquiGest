    - heading "Dashboard" [level=2] [ref=e732]
    - paragraph [ref=e733]:
      - text: El
      - strong [ref=e734]: Dashboard
      - text: es la pantalla principal. Se muestra al abrir la aplicación y ofrece un resumen visual completo del estado de todas las fincas gestionadas.
    - heading "Estadísticas rápidas" [level=3] [ref=e735]
    - paragraph [ref=e736]: "Cuatro tarjetas muestran de un vistazo: propietarios, inmuebles, contratos activos e importe pendiente de cobro."
    - heading "Gráficos de rendimiento (Chart.js)" [level=3] [ref=e737]
