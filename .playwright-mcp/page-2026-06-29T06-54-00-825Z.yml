    - heading "Preguntas frecuentes" [level=2] [ref=e1370]
    - heading "¿Puedo instalar AlquiGest en un servidor real (no localhost)?" [level=3] [ref=e1371]
    - paragraph [ref=e1372]:
      - text: Sí, pero el programa está configurado por defecto para funcionar solo en
      - code [ref=e1373]: localhost
      - text: . Para uso en servidor real necesitarás editar
      - code [ref=e1374]: assets/php/api.php
      - text: "y"
      - code [ref=e1375]: assets/php/plantillas.php
      - text: eliminando la restricción
      - code [ref=e1376]: requireLocalhost()
      - text: . No se recomienda exponer la aplicación a internet sin añadir autenticación.
    - heading "¿Cómo hago una copia de seguridad?" [level=3] [ref=e1377]
    - paragraph [ref=e1378]:
      - text: Desde
      - strong [ref=e1379]: Mi Empresa
      - text: ", pulsa"
      - strong [ref=e1380]: Descargar backup JSON
      - text: . El archivo descargado contiene todos los datos en formato JSON. Guárdalo en un lugar seguro. Puedes restaurarlo importando el JSON desde
      - code [ref=e1381]: install.php
      - text: .
    - heading "¿Por qué mis plantillas Word pierden el formato tras generar el DOCX?" [level=3] [ref=e1382]
    - paragraph [ref=e1383]: Al sustituir variables, AlquiGest reconstruye el contenido de cada párrafo en un único bloque de texto. Esto puede eliminar formatos aplicados solo a una parte de la palabra que contiene la variable (negrita parcial, color de letra, etc.). Para evitarlo, aplica el formato a todo el párrafo, no solo a la variable.
    - heading "¿Puedo tener varios contratos activos en el mismo inmueble?" [level=3] [ref=e1384]
    - paragraph [ref=e1385]: No. Un inmueble solo puede tener un contrato activo a la vez. Para cambiar de inquilino, primero da de baja el contrato actual y luego crea uno nuevo.
    - heading "¿Cómo funciona la revisión IPC?" [level=3] [ref=e1386]
    - paragraph [ref=e1387]: Cuando generas el recibo de un contrato con revisión de renta activa, AlquiGest detecta si ha pasado un año desde la última actualización y muestra el asistente IPC. El asistente consulta el IPC publicado por el INE y calcula la nueva renta sugerida. Puedes aceptarla, modificarla o rechazarla.
    - heading "¿Puedo generar facturas sin IVA?" [level=3] [ref=e1388]
    - paragraph [ref=e1389]: Sí. Si el contrato tiene IVA = 0%, la factura se genera con base imponible y total iguales, sin desglose de IVA. Esto es lo habitual para arrendamientos de vivienda habitual.
    - heading "¿Qué pasa si el inquilino no tiene email?" [level=3] [ref=e1390]
    - paragraph [ref=e1391]: El botón de envío por email aparece en gris y no puede pulsarse. Para enviarlo, añade el email del inquilino en su ficha.
    - heading "¿Cómo convierto una plantilla DOCX a PDF?" [level=3] [ref=e1392]
    - paragraph [ref=e1393]: AlquiGest no incluye conversión DOCX → PDF porque requiere LibreOffice instalado en el servidor, que no está disponible en MAMP/Windows. Abre el DOCX descargado con Word o LibreOffice y exporta a PDF desde ahí.
