    - heading "Cómo funciona" [level=3] [ref=e562]
    - list [ref=e563]:
      - listitem [ref=e564]: Elige el mes y el año para los que quieres generar recibos.
      - listitem [ref=e565]:
        - text: Pulsa
        - strong [ref=e566]: Vista previa
        - text: ": se muestra la lista de contratos activos que generarán recibo (con importe, inquilino e inmueble)."
      - listitem [ref=e567]:
        - text: Pulsa
        - strong [ref=e568]: Generar recibos
        - text: ": el sistema crea automáticamente un recibo por cada contrato activo con la renta vigente."
    - generic [ref=e569]:
      - generic [ref=e570]: ⚠️
      - generic [ref=e571]:
        - strong [ref=e572]: Sin duplicados
        - paragraph [ref=e573]: Si ya existe un recibo para un contrato en el mismo mes, ese contrato se omite. No se crean duplicados. Puedes ejecutar el proceso varias veces de forma segura.
    - heading "Plantillas DOCX para contratos" [level=2] [ref=e574]
    - paragraph [ref=e575]:
      - text: AlquiGest puede generar contratos personalizados en formato Word (
      - code [ref=e576]: .docx
      - text: ) a partir de plantillas que tú diseñas. Crea el documento en Word con el formato y cláusulas que necesites, inserta variables donde deban aparecer los datos reales, y AlquiGest los rellena automáticamente al generar.
