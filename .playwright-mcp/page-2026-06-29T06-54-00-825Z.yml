    - heading "Informes fiscales (IRPF / Hacienda)" [level=2] [ref=e806]
    - paragraph [ref=e807]: AlquiGest incluye tres informes para preparar la documentación fiscal de los arrendamientos según la normativa española.
    - generic [ref=e808]:
      - generic [ref=e809]: ⚠️
      - generic [ref=e810]:
        - strong [ref=e811]: Estos informes son una ayuda, no asesoramiento fiscal
        - paragraph [ref=e812]: Revisa siempre los datos con tu asesor fiscal antes de presentar cualquier declaración. Los gastos deducibles no están en la aplicación y debes añadirlos manualmente.
    - heading "1. Rendimientos trimestrales (IRPF)" [level=3] [ref=e813]
    - paragraph [ref=e814]:
      - text: Ingresos por arrendamiento desglosados en cuatro trimestres (T1-T4) por inmueble y propietario. Incluye la
      - strong [ref=e815]: reducción del 60 %
      - text: "(art. 23.2 LIRPF) cuando aplica: inmueble de vivienda habitual con contrato de duración ≥ 1 año."
    - heading "2. Declaración de la Renta — Capital Inmobiliario (Modelo 100)" [level=3] [ref=e816]
    - paragraph [ref=e817]: "Informe anual para rellenar la sección F del Modelo 100. Una fila por inmueble con: ingresos íntegros (K), gastos deducibles (L, a rellenar manualmente), rendimiento neto (M-N) y observaciones (P). Al final del Excel se incluye un recordatorio de todos los gastos deducibles del art. 23.1 LIRPF."
    - heading "3. Modelo 115 / 180 — Retenciones sobre arrendamientos" [level=3] [ref=e818]
    - paragraph [ref=e819]:
      - text: Para el Modelo 115 (declaración trimestral de retenciones) y el Modelo 180 (resumen anual). Solo incluye recibos con
      - code [ref=e820]: importe_irpf > 0
      - text: . Los plazos de presentación son el 20 de abril, julio, octubre y enero.
    - generic [ref=e821]:
      - generic [ref=e822]: 💡
      - generic [ref=e823]:
        - strong [ref=e824]: ¿Cuándo presentar el Modelo 115?
        - paragraph [ref=e825]: Solo cuando el inquilino es una persona jurídica (empresa, sociedad) o un empresario/profesional que alquila el inmueble para su actividad. Para inquilinos particulares sin actividad empresarial, no procede retención.
    - heading "Envío por Email" [level=2] [ref=e826]
    - paragraph [ref=e827]: AlquiGest puede enviar recibos y facturas por correo electrónico al inquilino, con el documento en HTML y PDF adjunto.
    - heading "Configuración previa (Gmail)" [level=3] [ref=e828]
    - list [ref=e829]:
