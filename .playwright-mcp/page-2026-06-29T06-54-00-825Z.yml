        - text: .
      - listitem [ref=e582]:
        - text: Guarda el archivo como
        - code [ref=e583]: .docx
        - text: .
      - listitem [ref=e584]:
        - text: En AlquiGest, ve a
        - strong [ref=e585]: Plantillas
        - text: →
        - strong [ref=e586]: Nueva plantilla
        - text: → sube el archivo.
      - listitem [ref=e587]:
        - text: Desde
        - strong [ref=e588]: Contratos
        - text: ", usa el botón de generación para crear el contrato con los datos reales."
