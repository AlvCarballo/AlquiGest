    - heading "Fiador solidario (opcional)" [level=3] [ref=e402]
    - paragraph [ref=e403]:
      - text: Cada contrato puede incluir un fiador solidario que queda vinculado al contrato. Sus datos aparecen en las plantillas DOCX a través de las variables
      - code [ref=e404]: "{{NombreFiador}}"
      - text: ","
      - code [ref=e405]: "{{NIFFiador}}"
      - text: "y"
      - code [ref=e406]: "{{DireccionFiador}}"
      - text: .
    - heading "Inquilinos secundarios (firmantes adicionales)" [level=3] [ref=e407]
    - paragraph [ref=e408]:
      - text: Puedes añadir hasta N inquilinos secundarios por contrato (copropietarios, pareja, etc.). Sus datos se gestionan en la sección inferior del formulario de contrato y se pueden editar independientemente en cualquier momento. En plantillas, se usan con el bloque repetitivo
      - code [ref=e409]: "{{#INQUILINOS_SECUNDARIOS}}...{{/INQUILINOS_SECUNDARIOS}}"
      - text: que se expande automáticamente una vez por cada inquilino secundario registrado.
    - heading "Estados del contrato" [level=3] [ref=e410]
    - list [ref=e411]:
      - listitem [ref=e412]:
        - strong [ref=e413]: Activo
        - text: — contrato en vigor, el inmueble está ocupado
      - listitem [ref=e414]:
        - strong [ref=e415]: Finalizado
        - text: — contrato vencido por fin de plazo
      - listitem [ref=e416]:
        - strong [ref=e417]: Rescindido
        - text: — contrato terminado antes de su vencimiento
    - generic [ref=e418]:
      - generic [ref=e419]: ⚠️
      - generic [ref=e420]:
        - strong [ref=e421]: Al dar de baja un contrato
        - paragraph [ref=e422]: El inmueble queda libre inmediatamente y puede asignarse a un nuevo inquilino. Los recibos y facturas del período se conservan en la base de datos.
    - heading "Recibos y Cobros" [level=2] [ref=e423]
    - paragraph [ref=e424]: Los recibos acreditan el cobro mensual del alquiler. AlquiGest los genera automáticamente a partir de los contratos activos.
    - heading "Generar recibos" [level=3] [ref=e425]
    - paragraph [ref=e426]:
      - text: Desde la pestaña
      - strong [ref=e427]: Recibos
      - text: ", pulsa"
      - strong [ref=e428]: Generar recibos del mes
      - text: . AlquiGest creará un recibo por cada contrato activo calculando automáticamente IVA e IRPF.
    - generic [ref=e429]:
      - generic [ref=e430]: 💡
      - generic [ref=e431]:
        - strong [ref=e432]: Numeración automática
        - paragraph [ref=e433]:
          - text: "El número de recibo usa el prefijo de Mi Empresa, año, mes y un secuencial único. Ejemplo:"
          - code [ref=e434]: REC-202601-00001
          - text: . Cada mes el secuencial comienza de nuevo.
    - heading "Estados de un recibo" [level=3] [ref=e435]
    - list [ref=e436]:
      - listitem [ref=e437]:
        - strong [ref=e438]: Pendiente
        - text: — emitido pero no cobrado
      - listitem [ref=e439]:
        - strong [ref=e440]: Parcial
        - text: — cobrado parcialmente, queda importe pendiente
      - listitem [ref=e441]:
        - strong [ref=e442]: Cobrado
        - text: — pagado en su totalidad
      - listitem [ref=e443]:
        - strong [ref=e444]: Anulado
        - text: — cancelado. No computa en informes pero se conserva por auditoría
    - heading "Registrar un cobro" [level=3] [ref=e445]
    - paragraph [ref=e446]:
      - text: Abre el detalle del recibo y pulsa
      - strong [ref=e447]: Registrar pago
      - text: . Puedes registrar fecha, importe (puede ser parcial), método de pago y cuenta bancaria. Un recibo puede tener múltiples pagos parciales.
    - heading "Facturas legales" [level=2] [ref=e448]
    - generic [ref=e449]:
      - generic [ref=e450]: ✅
      - generic [ref=e451]:
        - strong [ref=e452]: Cumplimiento del Reglamento de Facturación (RD 1619/2012)
        - paragraph [ref=e453]: Las facturas incluyen NIF/CIF del emisor y del cliente, base imponible, desglose de IVA y retención IRPF, numeración correlativa única e inmutable, y pie legal obligatorio.
    - heading "Cómo generar una factura" [level=3] [ref=e454]
    - generic [ref=e455]:
