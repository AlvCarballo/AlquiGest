    - heading "Alerta de revisión IPC" [level=3] [ref=e744]
    - paragraph [ref=e745]: Si algún contrato tiene la cláusula de revisión de renta y lleva más de 11 meses sin actualizarse, el Dashboard muestra un aviso amarillo con el listado de contratos afectados. Al generar el recibo de ese contrato, el asistente IPC calcula automáticamente la nueva renta sugerida según el índice aplicable.
    - heading "Campana de avisos" [level=3] [ref=e746]
