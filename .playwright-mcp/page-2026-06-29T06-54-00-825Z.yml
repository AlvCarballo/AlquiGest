    - heading "Herramientas de productividad" [level=2] [ref=e921]
    - heading "Búsqueda global" [level=3] [ref=e922]
    - paragraph [ref=e923]: La barra de búsqueda del encabezado (icono lupa) permite localizar al instante cualquier inquilino, inmueble, finca o propietario escribiendo parte del nombre. Los resultados aparecen en un desplegable y al hacer clic navega directamente al elemento.
    - heading "Modo oscuro" [level=3] [ref=e924]
    - paragraph [ref=e925]: El botón de luna/sol en el encabezado activa o desactiva el modo oscuro. La preferencia se guarda automáticamente y se restaura en cada apertura.
