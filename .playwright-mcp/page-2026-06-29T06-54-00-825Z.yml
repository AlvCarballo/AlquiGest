    - heading "IVA e IRPF en facturas" [level=3] [ref=e527]
    - list [ref=e528]:
      - listitem [ref=e529]:
        - strong [ref=e530]: "IVA = 0%:"
        - text: la factura indica que la operación está exenta o no sujeta a IVA.
      - listitem [ref=e531]:
        - strong [ref=e532]: "IVA > 0%:"
        - text: se muestra base imponible, tipo y cuota de IVA.
      - listitem [ref=e533]:
        - strong [ref=e534]: "Con IRPF:"
        - text: se muestra la retención como línea separada que resta del total.
    - heading "Aviso de justificante de pago" [level=3] [ref=e535]
    - paragraph [ref=e536]:
      - text: Si el contrato tiene marcado el check
      - strong [ref=e537]: "\"Mostrar aviso en recibo/factura\""
      - text: ", la factura impresa o en PDF incluye este aviso en rojo al pie:"
    - generic [ref=e538]: Esta factura no constituye justificante de pago sin el correspondiente justificante bancario que acredite su abono.
    - paragraph [ref=e539]: Útil para contratos con domiciliación bancaria donde el inquilino podría confundir la factura con un justificante de cobro. El mismo aviso también aparece en el recibo impreso si el check está activo.
