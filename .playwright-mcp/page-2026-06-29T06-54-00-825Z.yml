        - strong [ref=e863]: Implementación completa incluida
        - paragraph [ref=e864]: AlquiGest calcula el hash SHA-256 encadenado, construye el XML SOAP, lo envía a la AEAT con tu certificado digital (.p12/.pfx), y genera el código QR de verificación que aparece impreso en el PDF de la factura.
