    - heading "Activar / desactivar VERI*FACTU" [level=2] [ref=e145]
    - paragraph [ref=e146]:
      - text: La variable
      - code [ref=e147]: verifactu_activo
      - text: en la tabla
      - code [ref=e148]: configuracion
      - text: "controla si el sistema envía facturas a AEAT:"
    - list [ref=e149]:
      - listitem [ref=e150]:
        - code [ref=e151]: "0"
        - text: —
        - strong [ref=e152]: Desactivado
        - text: (valor por defecto). AlquiGest guarda las facturas localmente. No se genera hash ni se envía nada a la AEAT.
      - listitem [ref=e153]:
        - code [ref=e154]: "1"
        - text: —
        - strong [ref=e155]: Activado
        - text: . Cada factura nueva se firma automáticamente y se registra en el SIF de la AEAT.
    - paragraph [ref=e156]:
      - text: Puedes cambiar este valor desde la pantalla
      - strong [ref=e157]: VERI*FACTU
      - text: pulsando el botón
      - strong [ref=e158]: Activar / Desactivar
      - text: . AlquiGest comprueba que tengas NIF y certificado configurados antes de permitir la activación.
