      - listitem [ref=e278]:
        - strong [ref=e279]:
          - code [ref=e280]: verifactu.php
        - text: — función
        - code [ref=e281]: calcularHashFactura()
        - text: ": recalcula el hash en el momento del envío para garantizar integridad. Si hay discrepancia, se usa el recalculado."
