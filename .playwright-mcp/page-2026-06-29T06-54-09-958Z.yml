    - heading "Hash SHA-256 encadenado" [level=2] [ref=e255]
    - paragraph [ref=e256]: El SIF exige que cada factura tenga un hash SHA-256 calculado sobre sus campos obligatorios, encadenado con el hash de la factura anterior de la misma serie. Esto hace imposible insertar o modificar facturas retroactivamente sin invalidar toda la cadena.
    - heading "Cadena de hash (según Anexo I del RD 1007/2023)" [level=3] [ref=e257]
    - paragraph [ref=e258]:
      - text: Los campos se concatenan separados por
      - code [ref=e259]: "|"
      - text: "en este orden exacto:"
    - code [ref=e261]: IDEmisorFactura=B12345678|NumSerieFactura=FAC-202606-00001|FechaExpedicionFactura=17-06-2026|TipoFactura=F1|CuotaTotal=252.00|ImporteTotal=1452.00|Huella=<HASH_ANTERIOR>|FechaHoraHuella=17-06-2026T14:30:00
    - paragraph [ref=e262]: El resultado se pasa por SHA-256 y se convierte a hexadecimal en mayúsculas.
    - generic [ref=e263]:
      - generic [ref=e264]: 💡
      - generic [ref=e265]:
        - strong [ref=e266]: Primera factura de la serie
        - paragraph [ref=e267]:
          - text: Para la primera factura de cada serie, el campo
          - code [ref=e268]: Huella
          - text: de la cadena de hash debe ser literalmente
          - code [ref=e269]: "0"
          - text: (no NULL, no cadena vacía). Esto marca el inicio de la cadena.
