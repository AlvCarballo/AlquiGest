    - heading "QR de verificación" [level=2] [ref=e315]
    - paragraph [ref=e316]: Cuando la AEAT confirma el registro de una factura, AlquiGest construye la URL de verificación y la codifica como código QR. Esta URL permite a cualquier receptor verificar la factura en la sede electrónica de la AEAT.
    - heading "Formato de la URL de verificación" [level=3] [ref=e317]
    - code [ref=e319]: https://www2.agenciatributaria.gob.es/wlpl/TIKE-CONT/ValidarQR?nif=B12345678&numserie=FAC-202606-00001&fecha=17-06-2026&importe=1452.00
    - paragraph [ref=e320]:
      - text: (En el entorno de pruebas usa
      - code [ref=e321]: prewww2.agenciatributaria.gob.es
      - text: .)
    - heading "Dónde aparece el QR" [level=3] [ref=e322]
    - list [ref=e323]:
      - listitem [ref=e324]:
        - strong [ref=e325]: "En el PDF de la factura:"
        - text: se imprime automáticamente si la factura tiene
        - code [ref=e326]: qr_url
        - text: guardada. El QR se genera con la librería JavaScript
        - strong [ref=e327]: qrious
        - text: (cargada vía CDN) como imagen embebida, compatible con la generación de PDF mediante html2canvas.
      - listitem [ref=e328]:
        - strong [ref=e329]: "En la pantalla de Facturas:"
        - text: aparece el enlace "Verificar AEAT →" en la columna QR de la tabla de facturas enviadas.
      - listitem [ref=e330]:
        - strong [ref=e331]: "En la pantalla VERI*FACTU:"
        - text: tabla de historial de envíos con enlace directo.
    - heading "Certificado digital" [level=2] [ref=e332]
    - paragraph [ref=e333]:
      - text: La autenticación con la AEAT requiere el certificado digital del emisor en formato
      - strong [ref=e334]: PKCS12
      - text: (.p12 o .pfx). Es el mismo tipo de certificado que se usa para la firma digital de documentos y la sede electrónica.
    - heading "Cómo subir el certificado" [level=3] [ref=e335]
    - list [ref=e336]:
      - listitem [ref=e337]:
        - text: Desde la pantalla
        - strong [ref=e338]: VERI*FACTU
        - text: en AlquiGest, sección "Certificado digital".
      - listitem [ref=e339]: Selecciona tu archivo .p12 o .pfx e introduce la contraseña.
      - listitem [ref=e340]:
        - text: Pulsa
        - strong [ref=e341]: Subir certificado
        - text: . AlquiGest lo guarda en
        - code [ref=e342]: certs/
        - text: y verifica que la contraseña es correcta.
      - listitem [ref=e343]:
        - text: Guarda la contraseña pulsando
        - strong [ref=e344]: Guardar contraseña
        - text: .
    - generic [ref=e345]:
      - generic [ref=e346]: ⚠️
