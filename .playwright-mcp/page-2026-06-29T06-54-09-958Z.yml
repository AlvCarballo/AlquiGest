  - main [ref=e27]:
    - generic [ref=e28]:
      - generic [ref=e29]: AlquiGest v2.0.0 · Integración fiscal avanzada
      - heading "Guía de integración VERI*FACTU y AEAT" [level=1] [ref=e30]
      - paragraph [ref=e31]: Cómo funciona la integración de AlquiGest con el sistema de verificación de facturas de la Agencia Tributaria española.
    - generic [ref=e32]:
      - generic [ref=e33]: ✅
      - generic [ref=e34]:
        - strong [ref=e35]: Implementación completa disponible en AlquiGest v2.0.0
        - paragraph [ref=e36]: AlquiGest tiene implementado el hash SHA-256 encadenado, el envío SOAP a la AEAT, la firma con certificado digital (.p12/.pfx), el QR de verificación en el PDF y la pantalla completa de configuración. Solo tienes que subir tu certificado y activarlo.
    - heading "¿Qué es VERI*FACTU?" [level=2] [ref=e37]
    - paragraph [ref=e38]:
      - strong [ref=e39]: VERI*FACTU
      - text: (también llamado SIF – Sistema de Información de Facturación) es un sistema de la AEAT española que permite a los contribuyentes registrar facturas electrónicas directamente en la Agencia Tributaria en tiempo real.
    - paragraph [ref=e40]:
      - text: Está regulado por el
      - strong [ref=e41]: Real Decreto 1007/2023
      - text: y afecta a empresarios y profesionales que emitan facturas según el Reglamento de Facturación (RD 1619/2012).
    - heading "¿A quién afecta?" [level=3] [ref=e42]
    - list [ref=e43]:
      - listitem [ref=e44]: Empresas y autónomos que emitan facturas completas.
      - listitem [ref=e45]: Arrendadores de locales y oficinas (IVA 21%) dados de alta en actividades económicas.
      - listitem [ref=e46]:
        - strong [ref=e47]: Arrendadores de vivienda habitual (sin IVA) no empresarios
        - text: ": en principio no están obligados (consulta con tu asesor fiscal)."
    - generic [ref=e48]:
      - generic [ref=e49]: 💡
      - generic [ref=e50]:
        - strong [ref=e51]: ¿Necesito esto para alquiler de vivienda?
        - paragraph [ref=e52]: Para alquiler de vivienda habitual sin IVA y sin actividad empresarial, VERI*FACTU probablemente no es obligatorio. Para locales comerciales con IVA o gestión como actividad económica, consulta con un asesor fiscal.
    - heading "¿Qué hace VERI*FACTU técnicamente?" [level=3] [ref=e53]
    - list [ref=e54]:
      - listitem [ref=e55]:
        - text: Cada factura se firma con un
        - strong [ref=e56]: hash SHA-256
        - text: encadenado con la factura anterior (inmutabilidad).
      - listitem [ref=e57]:
        - text: Se envía un registro XML a la API de la AEAT usando
        - strong [ref=e58]: HTTPS/SOAP con certificado digital
        - text: .
      - listitem [ref=e59]: La AEAT devuelve una confirmación.
      - listitem [ref=e60]:
        - text: Se genera un
        - strong [ref=e61]: código QR
        - text: de verificación que se imprime en la factura.
      - listitem [ref=e62]: El receptor puede escanear el QR para verificar la factura en la sede electrónica de la AEAT.
